<html>
  <head>
    <title>function#extends_property</title>
  </head>
  <body>
    <script type="text/javascript">
      class Animal {
        constructor(name) {
          this.name = name;
        }
      }
      class Dog extends Animal {
      }
      var d = new Dog("Hachi");
      window.alert(d.name);
    </script>
  </body>
</html>
