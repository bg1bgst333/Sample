<html>
  <head>
    <title>function</title>
  </head>
  <body>
    <script type="text/javascript">
      function Person(name, age) {
        this.name = name;
        this.age = age;
      }
      var p = new Person("Taro", 20);
      window.alert("name: " + p.name + ", age: " + p.age);
    </script>
  </body>
</html>
