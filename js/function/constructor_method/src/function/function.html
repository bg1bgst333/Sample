<html>
  <head>
    <title>function</title>
  </head>
  <body>
    <script type="text/javascript">
      function Person(name, age) {
        this.name = name;
        this.age = age;
        this.greet = function(){
          window.alert("Hello, my name is " + this.name + ".");
        }
      }
      var p = new Person("Taro", 20);
      p.greet();
    </script>
  </body>
</html>
