<html>
  <head>
    <title>Object.assign</title>
  </head>
  <body>
    <script type="text/javascript">
      var obj1 = { name: "Taro" };
      var obj2 = { age: 20 };
      var obj3 = Object.assign(obj1, obj2);
      window.alert(obj3.name + " is " + obj3.age + " years old.");
    </script>
  </body>
</html>
