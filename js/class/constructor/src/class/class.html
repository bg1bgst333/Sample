<html>
  <head>
    <title>class#constructor</title>
  </head>
  <body>
    <script type="text/javascript">
      class Person {
        constructor(name, age) {
          this.name = name;
          this.age = age;
        }
      }
      var p = new Person("Taro", 20);
      window.alert("p.name = " + p.name + ", p.age = " + p.age);
    </script>
  </body>
</html>
