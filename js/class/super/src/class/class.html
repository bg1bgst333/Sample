<html>
  <head>
    <title>class#super</title>
  </head>
  <body>
    <script type="text/javascript">
      class Animal {
        constructor(name) {
          this.name = name;
        }
        greet() {
          window.alert("name: " + this.name);
        }
      }
      class Dog extends Animal {
        constructor(name, breed) {
          super(name);
          this.breed = breed;
        }
        greet() {
          super.greet();
          window.alert("breed: " + this.breed);
        }
      }
      var d = new Dog("Hachi", "Akita");
      d.greet();
    </script>
  </body>
</html>
